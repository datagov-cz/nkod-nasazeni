apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-design-system-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: design-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: design-system
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: design-system
    spec:
      containers:
        - name: nkd-design-system
          image: ghcr.io/datagov-cz/gov-design-system:2025-07-01
          imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: nkd-design-system
  namespace: nkd
  labels:
    app.kubernetes.io/name: design-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: design-system
  ports:
  - protocol: TCP
    targetPort: 80
    port: 80
