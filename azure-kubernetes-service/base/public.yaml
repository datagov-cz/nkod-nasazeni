---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nkd-public-pvc
  namespace: nkd
  labels:
    app.kubernetes.io/name: public-data
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: azurefile
  resources:
    requests:
      storage: 16Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nkd-public-data
  namespace: nkd
  labels:
    app.kubernetes.io/name: public-data
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: public-data
  ports:
  - protocol: TCP
    targetPort: 80
    port: 80
