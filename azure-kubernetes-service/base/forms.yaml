apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-forms-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: forms
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: forms
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forms
    spec:
      containers:
        - name: nkd-forms
          image: ghcr.io/datagov-cz/nkd-forms:develop
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "80"
            - name: NKOD_DATABOX
              valueFrom:
                configMapKeyRef:
                  name: nkd-configuration
                  key: nkd_databox
            - name: SOLR_ENDPOINT
              value: "http://nkd-solr:8983/solr/"
            - name: CLIENT_API_PREFIX
              value: /api/v2/forms/v1/
            - name: SERVER_API_PREFIX
              value: /v1/
            - name: DEREFERENCE_PROXY
              valueFrom:
                configMapKeyRef:
                  name: nkd-configuration
                  key: catalog_dereference_template
                  optional: true
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nkd-forms
  namespace: nkd
  labels:
    app.kubernetes.io/name: forms
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: forms
  ports:
  - protocol: TCP
    targetPort: 80
    port: 80
