apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-ndc-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-ndc
spec:
  template:
    spec:
      containers:
        - name: nkd-virtuoso
          image: ghcr.io/datagov-cz/nkd-virtuoso@sha256:25034fde784f590ff523f2fa6d60e7022aa3d12c1233b7e508e496d942b8eb6a
          env:
            # Use for system with 16 GB system memory free.
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "1360000"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "1000000"
          resources:
            requests:
              memory: "18Gi"
            limits:
              memory: "24Gi"
        - name: ssh-server
          image: ghcr.io/datagov-cz/nkd-ssh-server@sha256:5602e9a334c633c3ead9d2a66504e1ad68230a1bc5d32f8058b06f0b5fc7b51d
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
