apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-public-data-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: public-data
spec:
  template:
    spec:
      containers:
        - name: nkd-public-data
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "128Mi"
