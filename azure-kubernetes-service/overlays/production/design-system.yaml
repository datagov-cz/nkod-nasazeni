apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-design-system-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: design-system
spec:
  template:
    spec:
      containers:
        - name: nkd-design-system
          image: ghcr.io/datagov-cz/gov-design-system:2025-07-01
          resources:
            requests:
              memory: "32Mi"
            limits:
              memory: "64Mi"
