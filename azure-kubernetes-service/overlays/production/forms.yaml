apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-forms-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: forms
spec:
  template:
    spec:
      containers:
        - name: nkd-forms
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
