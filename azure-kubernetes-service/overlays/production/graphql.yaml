apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-graphql-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: graphql
spec:
  template:
    spec:
      containers:
        - name: nkd-graphql
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "1536Mi"
        - name: ssh-server
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "256Mi"
