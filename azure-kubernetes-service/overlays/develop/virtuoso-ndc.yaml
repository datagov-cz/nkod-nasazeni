apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-ndc-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-ndc
spec:
  template:
    spec:
      containers:
        - name: nkd-virtuoso
          image: ghcr.io/datagov-cz/nkd-virtuoso:develop
          env:
            # Use 170000 and 130000 for 2 GB
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "42500"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "32500"
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "2Gi"
        - name: ssh-server
          image: ghcr.io/datagov-cz/nkd-ssh-server:develop
          resources:
            requests:
              memory: "16Mi"
            limits:
              memory: "32Mi"
