apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-ndc-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-ndc
spec:
  template:
    spec:
      containers:
        - name: nkd-virtuoso
          env:
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "42500"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "32500"
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "2Gi"
        - name: ssh-server
          resources:
            requests:
              memory: "16Mi"
            limits:
              memory: "32Mi"
