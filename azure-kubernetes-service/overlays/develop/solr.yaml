apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-solr-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: solr
spec:
  template:
    spec:
      # We move this to virtuoso node pool to save resources.
      tolerations:
        - key: dedicated
          operator: Equal
          value: virtuoso
          effect: NoSchedule
      nodeSelector:
        agentpool: virtuoso
      containers:
        - name: nkd-solr
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "1Gi"
