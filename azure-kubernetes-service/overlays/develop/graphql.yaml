apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-graphql-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: graphql
spec:
  template:
    spec:
      containers:
        - name: nkd-graphql
          image: ghcr.io/datagov-cz/nkd-graphql:develop
          resources:
            requests:
              memory: "64Mi"
            limits:
              memory: "128Mi"
        - name: ssh-server
          image: ghcr.io/datagov-cz/nkd-ssh-server:develop
          resources:
            requests:
              memory: "16Mi"
            limits:
              memory: "32Mi"
