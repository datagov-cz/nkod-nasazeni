apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-portal-data-gov-cz-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: portal-data-gov-cz
spec:
  template:
    spec:
      containers:
        - name: nkd-portal-data-gov-cz
          image: ghcr.io/datagov-cz/nkd-jekyll:develop
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
