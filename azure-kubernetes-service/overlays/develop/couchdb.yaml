apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-couchdb-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: couchdb
spec:
  template:
    spec:
      containers:
        - name: nkd-couchdb
          image: ghcr.io/datagov-cz/nkd-couchdb:develop
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
