apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-caais-middleware-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: caais-middleware
spec:
  template:
    spec:
      containers:
        - name: nkd-caais-middleware
          image: ghcr.io/datagov-cz/caais-middleware:main
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
