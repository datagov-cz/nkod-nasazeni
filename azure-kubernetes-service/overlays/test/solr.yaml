apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-solr-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: solr
spec:
  template:
    spec:
      containers:
        - name: nkd-solr
          resources:
            requests:
              memory: "512Mi"
            limits:
              memory: "1Gi"
