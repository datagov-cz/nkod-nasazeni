apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-vocabulary-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-vocabulary
spec:
  template:
    spec:
      # We move this to virtuoso node pool to save resources.
      tolerations:
        - key: dedicated
          operator: Equal
          value: virtuoso
          effect: NoSchedule
      nodeSelector:
        agentpool: virtuoso
      containers:
        - name: nkd-virtuoso
          env:
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "42500"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "32500"
          resources:
            requests:
              memory: "1Gi"
            limits:
              memory: "2Gi"
        - name: ssh-server
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
