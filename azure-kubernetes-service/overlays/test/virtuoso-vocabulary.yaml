apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-vocabulary-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-vocabulary
spec:
  template:
    spec:
      nodeSelector:
        agentpool: virtuoso
      containers:
        - name: nkd-virtuoso
          image: ghcr.io/datagov-cz/nkd-virtuoso:main
          env:
            # Next two lines if there is 2 GB system memory free
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "170000"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "130000"
          resources:
            requests:
              memory: "2Gi"
            limits:
              memory: "3Gi"
        - name: ssh-server
          image: ghcr.io/datagov-cz/nkd-ssh-server:main
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
