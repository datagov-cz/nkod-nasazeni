apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-gateway-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: gateway
spec:
  template:
    spec:
      containers:
        - name: nkd-gateway
          image: ghcr.io/datagov-cz/nkd-gateway@sha256:eab3fc001664f0397a3faef3336b6c0a00362746a9d5365a1857e7a94df2c04f
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
