apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-gateway-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: gateway
spec:
  template:
    spec:
      containers:
        - name: nkd-gateway
          image: ghcr.io/datagov-cz/nkd-gateway@sha256:908a38e67ce852d401e72e799b698c24c4632e0e14500ba362b631be105bc568
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "256Mi"
