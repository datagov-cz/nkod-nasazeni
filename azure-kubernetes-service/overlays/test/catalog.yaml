apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-catalog-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: catalog
spec:
  template:
    spec:
      containers:
        - name: nkd-catalog
          image: ghcr.io/datagov-cz/nkd-catalog@sha256:ee9a3b9965a318534bcfd0859582d222f1115d5b62d662e7c80f98c42d35732e
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
