apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-catalog-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: catalog
spec:
  template:
    spec:
      containers:
        - name: nkd-catalog
          image: ghcr.io/datagov-cz/nkd-catalog:main
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
