apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-virtuoso-ndc-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: virtuoso-ndc
spec:
  template:
    spec:
      nodeSelector:
        agentpool: virtuoso
      containers:
        - name: nkd-virtuoso
          env:
            # Next two lines if there is 4 GB system memory free
            - name: VIRT_PARAMETERS_NUMBEROFBUFFERS
              value: "340000"
            - name: VIRT_PARAMETERS_MAXDIRTYBUFFERS
              value: "250000"
          resources:
            requests:
              memory: "4Gi"
            limits:
              memory: "5Gi"
        - name: ssh-server
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
