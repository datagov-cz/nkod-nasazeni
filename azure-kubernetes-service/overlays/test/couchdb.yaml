apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-couchdb-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: couchdb
spec:
  template:
    spec:
      containers:
        - name: nkd-couchdb
          image: ghcr.io/datagov-cz/nkd-couchdb:main
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
