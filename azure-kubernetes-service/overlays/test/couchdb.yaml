apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-couchdb-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: couchdb
spec:
  template:
    spec:
      containers:
        - name: nkd-couchdb
          image: ghcr.io/datagov-cz/nkd-couchdb@sha256:b6b77bb34bd03f5ea7e6af19f60d56051e2f70442945134db50a6fe76ae41a2d
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
