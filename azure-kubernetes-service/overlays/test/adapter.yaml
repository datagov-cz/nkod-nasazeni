apiVersion: apps/v1
kind: Deployment
metadata:
  name: nkd-adapter-deployment
  namespace: nkd
  labels:
    app.kubernetes.io/name: adapter
spec:
  template:
    spec:
      containers:
        - name: nkd-adapter
          resources:
            requests:
              memory: "128Mi"
            limits:
              memory: "512Mi"
        - name: nkd-registration-manager
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"